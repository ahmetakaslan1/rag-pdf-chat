version: '3.8'

services:
  postgres-db:
    image: pgvector/pgvector:0.8.0-pg17
    container_name: rag_postgres_prod
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:7-alpine
    container_name: rag_redis_prod
    restart: unless-stopped
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
    container_name: rag_backend_prod
    restart: unless-stopped
    env_file:
      - ./backend/.env.production 
    environment:
      - DB_HOST=postgres-db
      - REDIS_HOST=redis-cache
    ports:
      - "3000:3000"
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy

  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-https://api.senindomainin.com/api}
        - VITE_WS_URL=${VITE_WS_URL:-https://api.senindomainin.com/events}
    container_name: rag_frontend_prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local